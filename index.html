<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blacktop Syndicate GrowthMap</title>
<style>
* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

.hero {
  width: 100%;
  background: #000;
  display: flex;
  justify-content: center;
}

.hero-frame {
  position: relative;
  width: 100%;
  max-width: 1536px;
  line-height: 0;
}

.hero-frame img {
  display: block;
  width: 100%;
  height: auto;
}

.start-button-layer {
  position: absolute;
  left: 70.2%;
  top: 61.2%;
  width: 24.1%;
  height: 7.5%;
  border: 0;
  background: transparent;
  cursor: pointer;
  z-index: 10;
}

.mobile-start {
  display: none;
  background: #000;
  padding: 18px;
}

.red-button {
  border: 0;
  border-radius: 14px;
  padding: 16px 22px;
  background: linear-gradient(90deg, #ff1a1a, #8b0000);
  color: #fff;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: .04em;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,0,0,.28);
}

.mobile-start .red-button { width: 100%; }

.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  overflow-y: auto;
  background: rgba(0,0,0,.94);
  padding: 24px;
}

.modal.active { display: block; }

.modal-box {
  position: relative;
  width: min(960px, 100%);
  margin: 24px auto;
  padding: 34px;
  background:
    radial-gradient(circle at top right, rgba(255,0,0,.14), transparent 34%),
    #080000;
  border: 1px solid rgba(255,0,0,.38);
  border-radius: 26px;
  box-shadow: 0 0 80px rgba(255,0,0,.22);
}

.close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: #160000;
  color: #fff;
  border: 1px solid rgba(255,0,0,.28);
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 900;
}

h1, h2, h3 {
  color: #fff;
  text-transform: uppercase;
}

.modal-box h2 {
  margin: 0 0 8px;
  font-size: 40px;
}

.modal-box p {
  color: #c9c9c9;
  margin: 0 0 24px;
  line-height: 1.6;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 17px;
}

label {
  font-size: 14px;
  color: #f0f0f0;
  font-weight: 800;
}

input, select, textarea {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 15px;
  border-radius: 14px;
  background: #100000;
  color: #fff;
  border: 1px solid rgba(255,0,0,.22);
  font-size: 16px;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

.full { grid-column: 1 / -1; }

.generate {
  width: 100%;
  margin-top: 26px;
  padding: 19px;
  border: 0;
  border-radius: 16px;
  background: linear-gradient(90deg, #ff1a1a, #8b0000);
  color: #fff;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,0,0,.24);
}

.results {
  display: none;
  background:
    radial-gradient(circle at 12% 0%, rgba(255,0,0,.16), transparent 32%),
    radial-gradient(circle at 88% 0%, rgba(255,0,0,.12), transparent 30%),
    #020000;
  padding: 70px 22px;
}

.results.active { display: block; }

.results-grid {
  width: min(1200px, 100%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: .9fr 1.1fr;
  gap: 24px;
}

.panel {
  background: #070000;
  border: 1px solid rgba(255,0,0,.28);
  border-radius: 26px;
  padding: 30px;
  box-shadow: 0 0 70px rgba(255,0,0,.12);
}

.panel h2 {
  margin: 0 0 20px;
  font-size: 34px;
}

.score {
  color: #ff1a1a;
  font-size: 48px;
  font-weight: 900;
  margin-bottom: 18px;
}

.recommendation {
  margin-top: 14px;
  padding: 16px;
  border-radius: 16px;
  background: rgba(255,0,0,.09);
  border: 1px solid rgba(255,0,0,.18);
  color: #ddd;
  line-height: 1.55;
}

.package {
  margin-top: 24px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,.045);
  border: 1px solid rgba(255,0,0,.18);
}

.package small {
  display: block;
  color: #ff1a1a;
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.package strong { font-size: 30px; }

.report {
  width: 100%;
  min-height: 380px;
  white-space: pre-wrap;
  background: #030000;
  border: 1px solid rgba(255,0,0,.20);
  border-radius: 16px;
  color: #d7d7d7;
  padding: 18px;
  line-height: 1.6;
  font-size: 15px;
  overflow-x: auto;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}

.status {
  margin-top: 14px;
  color: #ffb3b3;
  font-size: 14px;
  line-height: 1.5;
}

@media(max-width: 900px) {
  .hero {
    justify-content: flex-start;
    overflow-x: auto;
  }

  .hero-frame { min-width: 900px; }

  .start-button-layer { display: none; }

  .mobile-start { display: block; }

  .form-grid, .results-grid { grid-template-columns: 1fr; }

  .modal-box { padding: 30px 20px; }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-frame">
    <img src="red-homepage.png" alt="Blacktop Syndicate GrowthMap" />
    <button class="start-button-layer" onclick="openQuestionnaire()" aria-label="Start Questionnaire"></button>
  </div>
</section>

<div class="mobile-start">
  <button class="red-button" onclick="openQuestionnaire()">START QUESTIONNAIRE →</button>
</div>

<div id="questionnaireModal" class="modal">
  <div class="modal-box">
    <button class="close" onclick="closeQuestionnaire()">✕ Close</button>

    <h2>Business Intake</h2>
    <p>Answer a few questions to generate your Blacktop GrowthMap.</p>

    <div class="form-grid">
      <label>Contact Name
        <input id="contactName" placeholder="Your name" />
      </label>

      <label>Email Address
        <input id="email" type="email" placeholder="you@email.com" />
      </label>

      <label>Phone Number
        <input id="phone" placeholder="Optional" />
      </label>

      <label>Business Name
        <input id="businessName" placeholder="Example: Suicide Jockeys" />
      </label>

      <label>Website
        <input id="website" placeholder="https://yourwebsite.com" />
      </label>

      <label>Industry
        <select id="industry">
          <option>Trucking / Logistics</option>
          <option>Diesel Shop / Auto Repair</option>
          <option>Restaurant / Bar</option>
          <option>Tattoo Shop</option>
          <option>Gym / Fitness</option>
          <option>Construction / Contractor</option>
          <option>Roofing / HVAC</option>
          <option>Barbershop / Salon</option>
          <option>Retail / Apparel</option>
          <option>Sports / Entertainment</option>
          <option>Other</option>
        </select>
      </label>

      <label>Social Media Status
        <select id="socialStatus">
          <option>Posts consistently</option>
          <option selected>Posts sometimes</option>
          <option>Rarely posts</option>
          <option>No social presence</option>
        </select>
      </label>

      <label>Uses Reels / Short Videos?
        <select id="shortVideo">
          <option selected>Yes</option>
          <option>No</option>
        </select>
      </label>

      <label>Runs Paid Ads?
        <select id="paidAds">
          <option>Yes</option>
          <option selected>No</option>
        </select>
      </label>

      <label>Main Goal
        <select id="goal">
          <option>More calls</option>
          <option>More leads</option>
          <option>More walk-in traffic</option>
          <option>More booked appointments</option>
          <option selected>More online sales</option>
          <option>Brand awareness</option>
        </select>
      </label>

      <label>Monthly Marketing Budget
        <select id="budget">
          <option selected>$0 - $250</option>
          <option>$250 - $750</option>
          <option>$750 - $1,500</option>
          <option>$1,500+</option>
        </select>
      </label>

      <label>Preferred Next Step
        <select id="nextStep">
          <option selected>Send me the report</option>
          <option>I want a strategy call</option>
          <option>I need content help</option>
          <option>I need website/funnel help</option>
          <option>I need automation help</option>
        </select>
      </label>

      <label class="full">Extra Notes
        <textarea id="notes" placeholder="Anything important about the business, current problem, offer, or audience?"></textarea>
      </label>
    </div>

    <button class="generate" onclick="generateGrowthMap()">GENERATE GROWTHMAP →</button>
  </div>
</div>

<section id="results" class="results">
  <div class="results-grid">
    <div class="panel">
      <h2>Recommended Growth Route</h2>
      <div id="score" class="score">--/100</div>
      <div id="recommendations"></div>

      <div class="package">
        <small>SUGGESTED PACKAGE</small>
        <strong id="packageName">Waiting For Audit</strong>
      </div>
    </div>

    <div class="panel">
      <h2>Your AI GrowthMap Report</h2>
      <pre id="report" class="report">Your GrowthMap report will appear here after you complete the questionnaire.</pre>

      <div class="actions">
        <button class="red-button" onclick="copyReport()">COPY MY GROWTHMAP</button>
        <button class="red-button" onclick="downloadReport()">DOWNLOAD REPORT</button>
        <button class="red-button" onclick="sendSubmission()">SEND TO BLACKTOP</button>
      </div>

      <div id="submissionStatus" class="status"></div>
    </div>
  </div>
</section>

<script>
const FORM_ENDPOINT = "https://formspree.io/f/mpqnzpya";

let latestReport = "Your GrowthMap report will appear here after you complete the questionnaire.";
let latestLead = null;

function openQuestionnaire() {
  document.getElementById("questionnaireModal").classList.add("active");
}

function closeQuestionnaire() {
  document.getElementById("questionnaireModal").classList.remove("active");
}

function generateGrowthMap() {
  const contactName = document.getElementById("contactName").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const businessName = document.getElementById("businessName").value.trim() || "Business Name";
  const website = document.getElementById("website").value.trim();
  const industry = document.getElementById("industry").value;
  const socialStatus = document.getElementById("socialStatus").value;
  const shortVideo = document.getElementById("shortVideo").value;
  const paidAds = document.getElementById("paidAds").value;
  const goal = document.getElementById("goal").value;
  const budget = document.getElementById("budget").value;
  const nextStep = document.getElementById("nextStep").value;
  const notes = document.getElementById("notes").value.trim();

  let score = 45;

  if (website) score += 12;
  if (socialStatus === "Posts consistently") score += 18;
  if (socialStatus === "Posts sometimes") score += 10;
  if (socialStatus === "Rarely posts") score += 4;
  if (shortVideo === "Yes") score += 14;
  if (paidAds === "Yes") score += 10;
  if (budget === "$750 - $1,500") score += 6;
  if (budget === "$1,500+") score += 10;

  score = Math.min(score, 98);

  const packageName =
    score >= 82 ? "Scale Route" :
    score >= 65 ? "Growth Route" :
    "Foundation Route";

  const recs = [];

  recs.push("Build the next 30 days around " + goal.toLowerCase() + " with one clear offer and one direct call-to-action.");

  if (website) {
    recs.push("Use the website as the main conversion hub and tighten the homepage around one offer, one proof section, and one action button.");
  } else {
    recs.push("Create a clean landing page first so traffic has somewhere to convert into calls, leads, or appointments.");
  }

  if (socialStatus === "Posts consistently") {
    recs.push("Keep posting consistently, but organize content into repeatable pillars: proof, offer, education, behind-the-scenes, and local authority.");
  } else {
    recs.push("Increase posting consistency with a weekly content system built around reels, customer proof, service explanations, and authority posts.");
  }

  if (shortVideo === "Yes") {
    recs.push("Double down on short-form video and repurpose every reel across Facebook, Instagram, TikTok, YouTube Shorts, and Google Business Profile.");
  } else {
    recs.push("Add short-form video immediately. This is the fastest way to create trust, reach, and retargeting content.");
  }

  if (paidAds === "Yes") {
    recs.push("Tighten paid ads around one campaign goal, one landing page, one offer, and one tracked conversion action.");
  } else {
    recs.push("Do not start heavy ad spend yet. First clean up the offer, content, landing page, and follow-up system.");
  }

  if (budget === "$0 - $250") {
    recs.push("Use sweat equity first: organic content, Google Business updates, local Facebook groups, referrals, and direct outreach.");
  } else {
    recs.push("Use the monthly budget for controlled testing: content production, local ads, retargeting, and monthly reporting.");
  }

  if (notes) {
    recs.push("Use the notes provided as campaign context and build messaging around the current problem, audience, and strongest offer.");
  }

  document.getElementById("score").innerText = score + "/100";

  document.getElementById("recommendations").innerHTML = recs
    .map(function(item) {
      return '<div class="recommendation">✅ ' + item + '</div>';
    })
    .join("");

  document.getElementById("packageName").innerText = packageName;

  latestReport =
`BLACKTOP GROWTHMAP AUDIT

Contact Name: ${contactName || "Not provided"}
Email: ${email || "Not provided"}
Phone: ${phone || "Not provided"}

Business: ${businessName}
Industry: ${industry}
Website: ${website || "No website provided"}
Main Goal: ${goal}
Marketing Budget: ${budget}
Preferred Next Step: ${nextStep}

Growth Score: ${score}/100
Suggested Route: ${packageName}

Business Notes:
${notes || "No extra notes provided."}

Recommended Growth Route:
- ${recs.join("\n- ")}

Recommended Services:
- Weekly Reels
- Social Management
- Local Ads
- Google Business Profile Optimization
- Landing Page / Website Cleanup
- Monthly Reporting

Next Step:
Start with the highest-impact fix first: clean up the offer, create consistent content, and drive every post or ad toward one conversion action.

Built by Blacktop GrowthMap™.
Powered by Blacktop AI.`;

  latestLead = {
    contactName,
    email,
    phone,
    businessName,
    website,
    industry,
    socialStatus,
    shortVideo,
    paidAds,
    goal,
    budget,
    nextStep,
    notes,
    score,
    packageName,
    report: latestReport,
    createdAt: new Date().toISOString()
  };

  document.getElementById("report").innerText = latestReport;
  document.getElementById("results").classList.add("active");

  closeQuestionnaire();

  setTimeout(function() {
    document.getElementById("results").scrollIntoView({ behavior: "smooth" });
  }, 150);

  sendSubmission(true);
}

function copyReport() {
  navigator.clipboard.writeText(latestReport)
    .then(function() {
      alert("GrowthMap copied.");
    })
    .catch(function() {
      alert("Copy failed. You can manually highlight and copy the report.");
    });
}

function downloadReport() {
  const blob = new Blob([latestReport], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const business = latestLead && latestLead.businessName ? latestLead.businessName.replace(/[^a-z0-9]/gi, "-").toLowerCase() : "growthmap";
  link.href = url;
  link.download = business + "-blacktop-growthmap.txt";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function sendSubmission(silent) {
  const status = document.getElementById("submissionStatus");

  if (!latestLead) {
    status.innerText = "Generate a GrowthMap first.";
    return;
  }

  status.innerText = "Sending submission...";

  fetch(FORM_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(latestLead)
  })
  .then(function(response) {
    if (response.ok) {
      status.innerText = "Submission sent to Blacktop successfully.";
      if (!silent) alert("Submission sent.");
    } else {
      status.innerText = "Submission failed. Check your Formspree settings.";
    }
  })
  .catch(function() {
    status.innerText = "Submission failed. Check the Formspree endpoint.";
  });
}
</script>

</body>
</html>
