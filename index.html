<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blacktop AI Content Engine Test</title>
<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  padding: 30px;
}
.wrap { max-width: 900px; margin: 0 auto; }
h1 { font-size: 44px; text-transform: uppercase; }
p { color: #ccc; line-height: 1.6; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
input, select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,0,0,.25);
  background: #100000;
  color: #fff;
  font-size: 15px;
}
button {
  margin-top: 18px;
  width: 100%;
  padding: 17px;
  border: 0;
  border-radius: 14px;
  background: linear-gradient(90deg, #ff1a1a, #8b0000);
  color: #fff;
  font-weight: 900;
  font-size: 18px;
  cursor: pointer;
}
.card {
  margin-top: 24px;
  padding: 22px;
  border-radius: 20px;
  border: 1px solid rgba(255,0,0,.28);
  background: #070000;
  box-shadow: 0 0 40px rgba(255,0,0,.10);
}
pre { white-space: pre-wrap; line-height: 1.6; color: #ddd; }
@media(max-width: 800px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Blacktop AI Content Engine</h1>
  <p>This is the Phase 2 test page. Once this works, we merge the engine into the full Blacktop site.</p>

  <div class="grid">
    <input id="businessName" placeholder="Business Name" value="Suicide Jockeys" />
    <input id="industry" placeholder="Industry" value="Retail / Apparel" />
    <input id="goal" placeholder="Main Goal" value="More online sales" />
    <input id="audience" placeholder="Target Audience" value="Fuel tanker drivers and blue-collar risk takers" />
    <input id="offer" placeholder="Main Offer" value="Road-tested apparel built for risk takers" />
    <input id="tone" placeholder="Brand Tone" value="Rugged, blue-collar, gritty, authentic" />
    <select id="platform">
      <option>Facebook and Instagram</option>
      <option>TikTok</option>
      <option>Google Business Profile</option>
      <option>Email</option>
    </select>
    <select id="contentType">
      <option>Monthly content starter pack</option>
      <option>Social posts</option>
      <option>Reel ideas</option>
      <option>Paid ads</option>
      <option>Email campaign</option>
    </select>
  </div>

  <button onclick="generateContent()">Generate Content</button>

  <div class="card">
    <pre id="output">Generated content will appear here.</pre>
  </div>
</div>

<script>
async function generateContent() {
  const output = document.getElementById("output");
  output.textContent = "Generating Blacktop AI content...";

  const payload = {
    businessName: document.getElementById("businessName").value,
    industry: document.getElementById("industry").value,
    goal: document.getElementById("goal").value,
    audience: document.getElementById("audience").value,
    offer: document.getElementById("offer").value,
    tone: document.getElementById("tone").value,
    platform: document.getElementById("platform").value,
    contentType: document.getElementById("contentType").value
  };

  try {
    const response = await fetch("/api/generate-content", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if (!response.ok) {
      output.textContent = "Error: " + (data.error || "Something went wrong.");
      return;
    }

    output.textContent = data.content;
  } catch (error) {
    output.textContent = "Request failed: " + error.message;
  }
}
</script>
</body>
</html>
